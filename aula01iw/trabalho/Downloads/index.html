<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body {
            margin: 50px;
            background-color: lightpink;
          
      
        }

        .card1 {
            margin: 50px;
            border-radius: 15px;
            background-color: crimson;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
        
        }

        .card2 {
            margin: 50px;
            border-radius: 15px;
            background-color: dodgerblue;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            
        }

        .card3 {
            margin: 20px;
            border-radius: 15px;
            background-color: khaki;
            padding-top: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            padding-right: 20px;
            display: grid;
            grid-template-columns: repeat(3, 300px); /* 3 colunas */
            gap: 20px; /* espaço entre imagens */
            justify-content: center; /* centraliza horizontal */
            align-content: center;   /* centraliza vertical */
           
        }

        .fig1 {
           width: 300px;
           height: 300px;
           border-radius: 15px;
           
        }

    </style>

    <div class="card1">
       <div class="card2">
           <div class="card3">
            <img src="sp1.png" alt="sp1" class="fig1">
            <img src="sp2.jpg" alt="sp2" class="fig1">
            <img src="sp3.jpg" alt="sp3" class="fig1">
            <img src="sp4.jpg" alt="sp4" class="fig1">
            <img src="sp5.jpg" alt="sp5" class="fig1">
            <img src="sp6.jpg" alt="sp6" class="fig1">
            <img src="sp7.jpg" alt="sp7" class="fig1">
            <img src="sp8.jpg" alt="sp8" class="fig1">
            <img src="sp9.jpg" alt="sp9" class="fig1">
             </div>

       </div>

    </div>
      
</body>
</html>
